version: "1.0"

services:
 mongo:
   image: mongo:7
   container_name: mongo
   restart: always
   ports:
     - "27017:27017"
   volumes:
     - mongo_data:/data/db
   networks:
     - app_net

 api:
   build: .
   container_name: fastapi_app
   restart: always
   ports:
     - "8080:8080"
   environment:
     - MONGO_URL=mongodb://mongo:27017
     - DB_NAME=school
   depends_on:
     - mongo
   networks:
     - app_net

volumes:
 mongo_data:

networks:
 app_net:
   driver: bridge
